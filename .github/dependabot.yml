version: 2
updates:
- package-ecosystem: uv
  directory: "/"
  schedule:
    interval: monthly
    day: monday
    time: "05:43"
  open-pull-requests-limit: 50
  target-branch: main
  labels:
  - dependency_updates
  versioning-strategy: "increase-if-necessary"
  groups:
    python-production:
      applies-to: version-updates
      dependency-type: production
    python-development:
      applies-to: version-updates
      dependency-type: development
    python-security:
      applies-to: security-updates
      dependency-type: production
  ignore:
  - dependency-name: "elasticsearch*"
    versions: [ ">=8" ]
- package-ecosystem: gitsubmodule
  directory: "/"
  schedule:
    interval: daily
    time: "05:38"
  target-branch: main
  labels:
  - providers_updates
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: "05:33"
  target-branch: main
  labels:
  - CI
  groups:
    github-actions:
      applies-to: version-updates
      dependency-type: production
